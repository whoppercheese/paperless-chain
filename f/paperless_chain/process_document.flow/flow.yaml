summary: Process new Paperless document
description: >-
  Triggered by Paperless webhook. Fetches document, analyzes structure,
  generates metadata, LLM-chunks text, embeds with bge-m3 and stores in Qdrant.
value:
  same_worker: true
  preprocessor_module:
    id: preprocessor
    summary: Parse Paperless doc_url
    value:
      type: script
      path: f/paperless_chain/preprocess_webhook
  failure_module:
    id: failure
    summary: Notify on flow error and tag AI-Error
    value:
      type: script
      path: f/paperless_chain/handle_flow_failure
      input_transforms:
        error:
          type: javascript
          expr: "previous_result.error ?? previous_result"
        doc_id:
          type: javascript
          expr: flow_input.doc_id
  modules:
    - id: fetch
      summary: Fetch document from Paperless
      value:
        type: script
        path: f/paperless_chain/fetch_document
        input_transforms:
          doc_id:
            type: javascript
            expr: flow_input.doc_id
    - id: summarize
      summary: Summarize document and extract date with LLM
      value:
        type: script
        path: f/paperless_chain/summarize_document
        input_transforms:
          doc_id:
            type: javascript
            expr: results.fetch.doc_id
          text:
            type: javascript
            expr: results.fetch.text
          document_language:
            type: javascript
            expr: results.fetch.document_language
          added_date:
            type: javascript
            expr: results.fetch.added_date
    - id: analyze
      summary: Extract metadata from document summary
      value:
        type: script
        path: f/paperless_chain/analyze_document
        input_transforms:
          doc_id:
            type: javascript
            expr: results.fetch.doc_id
          summary:
            type: javascript
            expr: results.summarize.summary
          existing_document_types:
            type: javascript
            expr: results.fetch.existing_document_types
          existing_tags:
            type: javascript
            expr: results.fetch.existing_tags
          existing_correspondents:
            type: javascript
            expr: results.fetch.existing_correspondents
          added_date:
            type: javascript
            expr: results.fetch.added_date
          current_tag_names:
            type: javascript
            expr: results.fetch.current_tag_names
          current_correspondent_id:
            type: javascript
            expr: results.fetch.current_metadata.correspondent
          document_language:
            type: javascript
            expr: results.fetch.document_language
          summarize_warnings:
            type: javascript
            expr: results.summarize.warnings
    - id: update
      summary: Update Paperless metadata
      value:
        type: script
        path: f/paperless_chain/update_paperless
        input_transforms:
          doc_id:
            type: javascript
            expr: results.analyze.doc_id
          title:
            type: javascript
            expr: results.analyze.title
          selected_tags:
            type: javascript
            expr: results.analyze.selected_tags
          selected_correspondent:
            type: javascript
            expr: results.analyze.selected_correspondent
          existing_tags:
            type: javascript
            expr: results.fetch.existing_tags
          current_tag_ids:
            type: javascript
            expr: results.fetch.current_metadata.tag_ids
          existing_correspondents:
            type: javascript
            expr: results.fetch.existing_correspondents
          existing_document_types:
            type: javascript
            expr: results.fetch.existing_document_types
          selected_document_type:
            type: javascript
            expr: results.analyze.selected_document_type
          document_date:
            type: javascript
            expr: results.summarize.document_date
          warnings:
            type: javascript
            expr: results.analyze.warnings
    - id: chunk
      summary: LLM semantic chunking
      value:
        type: script
        path: f/paperless_chain/chunk_document
        input_transforms:
          doc_id:
            type: javascript
            expr: results.fetch.doc_id
          text:
            type: javascript
            expr: results.fetch.text
          summary:
            type: javascript
            expr: results.summarize.summary
          document_type_name:
            type: javascript
            expr: results.update.document_type_name
          correspondent_name:
            type: javascript
            expr: results.update.correspondent_name
          tag_names:
            type: javascript
            expr: results.update.tag_names
          document_language:
            type: javascript
            expr: results.fetch.document_language
    - id: embed
      summary: Generate embeddings
      value:
        type: script
        path: f/paperless_chain/generate_embeddings
        input_transforms:
          chunks:
            type: javascript
            expr: results.chunk.chunks
    - id: store
      summary: Store vectors in Qdrant
      value:
        type: script
        path: f/paperless_chain/store_qdrant
        input_transforms:
          embedded_chunks:
            type: javascript
            expr: results.embed.embedded_chunks
    - id: status_tag
      summary: Apply AI-Warning tag when processing had warnings
      value:
        type: script
        path: f/paperless_chain/apply_status_tags
        input_transforms:
          doc_id:
            type: javascript
            expr: results.fetch.doc_id
          summarize_warnings:
            type: javascript
            expr: results.summarize.warnings
          analyze_warnings:
            type: javascript
            expr: results.analyze.warnings
          update_warnings:
            type: javascript
            expr: results.update.warnings
          chunk_warnings:
            type: javascript
            expr: results.chunk.warnings
    - id: notify
      summary: Send warnings and status
      value:
        type: script
        path: f/paperless_chain/notify
        input_transforms:
          doc_id:
            type: javascript
            expr: results.update.doc_id
          title:
            type: javascript
            expr: results.update.title
          correspondent_name:
            type: javascript
            expr: results.update.correspondent_name
          document_type_name:
            type: javascript
            expr: results.update.document_type_name
          warnings:
            type: javascript
            expr: results.status_tag.warnings
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
      description: Paperless document ID (set by preprocessor from doc_url)
  required: []
