summary: Update Paperless document metadata
description: Patches document metadata in Paperless. Sets content tags from LLM and always applies AI-Processed.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    title:
      type: string
    selected_tags:
      type: array
    selected_correspondent:
      type: string
      nullable: true
    existing_tags:
      type: array
    current_tag_ids:
      type: array
    existing_correspondents:
      type: array
    existing_document_types:
      type: array
    selected_document_type:
      type: string
      nullable: true
    document_date:
      type: string
      nullable: true
    warnings:
      type: array
  required:
    - doc_id
    - title
    - selected_tags
    - existing_tags
    - existing_correspondents
    - existing_document_types
