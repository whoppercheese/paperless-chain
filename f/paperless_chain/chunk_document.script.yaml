summary: LLM semantic chunking
description: Splits document text into semantic chunks via LLM and adds the summary as a separate embedding chunk.
lock: ''
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    doc_id:
      type: integer
    text:
      type: string
    summary:
      type: string
      default: ''
    document_type_name:
      type: string
      nullable: true
    correspondent_name:
      type: string
      nullable: true
    tag_names:
      type: array
    document_language:
      type: string
      default: de
  required:
    - doc_id
    - text
